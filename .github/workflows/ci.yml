name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type check
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest core/tests/unit -v

      - name: Integration tests
        run: uv run pytest core/tests/integration -v

      - name: BDD tests
        run: uv run pytest core/tests/behaviour -v
